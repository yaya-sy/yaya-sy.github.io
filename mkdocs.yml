site_name: Yaya Sy
# Repository
repo_name: yaya-sy/yaya-sy.github.io
repo_url: https://github.com/yaya-sy/yaya-sy.github.io
theme:
  name: material
  palette: 
    # Palette toggle for dark mode
    - scheme: slate
      toggle:
        icon: material/toggle-switch
        name: Switch to dark mode
      primary: black

    # Palette toggle for light mode
    - scheme: default
      toggle:
        icon: material/toggle-switch-off-outline
        name: Switch to light mode
      primary: black
  features:
    - navigation.tabs

extra:
  social:
  - icon: fontawesome/brands/github
    link: https://github.com/yaya-sy
  - icon: fontawesome/brands/twitter
    link: https://twitter.com/seygalare
plugins:
  - blog:
      post_dir: "{blog}/posts"
markdown_extensions:
  - pymdownx.arithmatex:
      generic: true

extra_javascript:
  - javascripts/mathjax.js
  - https://polyfill.io/v3/polyfill.min.js?features=es6
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

nav:
  - Home: index.md
  - News:
    - news/index.md
  - Blog:
    - blog/index.md